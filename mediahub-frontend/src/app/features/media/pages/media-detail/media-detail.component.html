<a routerLink="/catalog" class="btn btn-link ps-0 mb-3">← Retour au catalogue</a>

<div *ngIf="loading" class="alert alert-info">Chargement du média...</div>
<div *ngIf="!loading && errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<section *ngIf="!loading && !errorMessage && media" class="card">
  <div class="card-body">
    <h1 class="h3 mb-3">{{ media.title }}</h1>

    <div class="d-flex flex-wrap gap-2 mb-3">
      <span class="badge text-bg-dark">{{ media.type }}</span>
      <span class="badge text-bg-secondary">{{ media.releaseYear }}</span>
      <span class="badge text-bg-light">{{ media.category }}</span>
      <span class="badge text-bg-light">{{ media.genre }}</span>
    </div>

    <h2 class="h6">Description</h2>
    <p class="mb-0">{{ media.description || 'Aucune description disponible.' }}</p>
  </div>
</section>
