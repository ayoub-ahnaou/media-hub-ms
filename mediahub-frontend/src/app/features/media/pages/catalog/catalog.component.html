<section class="mb-4">
  <h1 class="h3 mb-1">Catalogue média</h1>
  <p class="text-muted mb-0">Consommation API du media-service</p>
</section>

<section class="card mb-4">
  <div class="card-body">
    <div class="row g-2 align-items-end">
      <div class="col-12 col-md-4">
        <label class="form-label">Catégorie</label>
        <input class="form-control" [(ngModel)]="category" placeholder="Ex: Fiction">
      </div>

      <div class="col-12 col-md-4">
        <label class="form-label">Genre</label>
        <input class="form-control" [(ngModel)]="genre" placeholder="Ex: Action">
      </div>

      <div class="col-12 col-md-4 d-flex gap-2">
        <button class="btn btn-primary" (click)="searchByCategory()">Filtrer catégorie</button>
        <button class="btn btn-outline-primary" (click)="searchByGenre()">Filtrer genre</button>
        <button class="btn btn-outline-secondary" (click)="resetFilters()">Reset</button>
      </div>
    </div>
  </div>
</section>

<div *ngIf="loading" class="alert alert-info">Chargement...</div>
<div *ngIf="!loading && errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<div class="row g-3" *ngIf="!loading && !errorMessage">
  <div class="col-12 col-md-6 col-xl-4" *ngFor="let media of medias">
    <article class="card h-100 media-card">
      <div class="card-body d-flex flex-column">
        <h2 class="h5 mb-2">{{ media.title }}</h2>
        <p class="mb-2"><span class="badge text-bg-dark me-2">{{ media.type }}</span>{{ media.releaseYear }}</p>
        <p class="mb-2"><strong>Catégorie:</strong> {{ media.category }}</p>
        <p class="mb-3"><strong>Genre:</strong> {{ media.genre }}</p>
        <p class="text-muted flex-grow-1">{{ media.description || 'Aucune description.' }}</p>

        <a class="btn btn-sm btn-primary mt-2 align-self-start" [routerLink]="['/media', media.id]">
          Voir détail
        </a>
      </div>
    </article>
  </div>
</div>

<div *ngIf="!loading && !errorMessage && medias.length === 0" class="alert alert-warning mt-3">
  Aucun média trouvé.
</div>
