services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_service_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - media-hub-net

  eureka-service:
    build:
      context: .
      dockerfile: eureka-service/Dockerfile
    container_name: eureka-service
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-service
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-service:8761/eureka/
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || wget -q --spider http://localhost:8761"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - media-hub-net

  config-service:
    build:
      context: .
      dockerfile: config-service/Dockerfile
    container_name: config-service
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-service:8761/eureka/
    depends_on:
      eureka-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/application/default || wget -q --spider http://localhost:8888"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "8888:8888"
    networks:
      - media-hub-net

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      SPRING_APPLICATION_JSON: >-
        {"eureka":{"client":{"service-url":{"defaultZone":"http://eureka-service:8761/eureka/"}}}}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_service_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8085
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-service:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    ports:
      - "8085:8085"
    networks:
      - media-hub-net

  media-service:
    build:
      context: .
      dockerfile: media-service/Dockerfile
    container_name: media-service
    environment:
      SPRING_APPLICATION_JSON: >-
        {"eureka":{"client":{"service-url":{"defaultZone":"http://eureka-service:8761/eureka/"}}}}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/media_service_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8082
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-service:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - media-hub-net

  subscription-service:
    build:
      context: .
      dockerfile: subscription-service/Dockerfile
    container_name: subscription-service
    environment:
      SPRING_APPLICATION_JSON: >-
        {"eureka":{"client":{"service-url":{"defaultZone":"http://eureka-service:8761/eureka/"}}}}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/subscription_service_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8083
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-service:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      media-service:
        condition: service_started
    ports:
      - "8083:8083"
    networks:
      - media-hub-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      SPRING_APPLICATION_JSON: >-
        {"eureka":{"client":{"service-url":{"defaultZone":"http://eureka-service:8761/eureka/"}}}}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-service:8761/eureka/
    depends_on:
      eureka-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      user-service:
        condition: service_started
      media-service:
        condition: service_started
      subscription-service:
        condition: service_started
    ports:
      - "8081:8080"
    networks:
      - media-hub-net

volumes:
  mysql_data:

networks:
  media-hub-net:
    driver: bridge
