spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          # "lb://" means Load Balanced ? Gateway will ask Eureka for the
          # actual address of "user-service" instead of using a hardcoded URL.
          uri: lb://user-service
          predicates:
          # Any request starting with /api/users will be routed to user-service.
          - Path=/api/users/**

        - id: user-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**

        - id: media-service
          uri: lb://media-service
          predicates:
            - Path=/api/media/**

        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/api/subscriptions/**

server:
  port: 8080

eureka:
  client:
    service-url:
        defaultZone: http://localhost:8761/eureka/